<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stark Industries · Glass Phone UI</title>
  <style>
    :root{
      --neon:#00f6ff;
      --neon-soft:rgba(0,246,255,.35);
      --amber:#ffb300;
      --bg:#03070a;
      --glass:rgba(255,255,255,.08);
    }

    *{box-sizing:border-box;}
    html,body{
      margin:0; height:100%; background:radial-gradient(1200px 800px at 50% 20%, #0a1a22, var(--bg));
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont;
      color:#e8feff; overflow:hidden;
    }

    /* ====== DEVICE FRAME ====== */
    .device{
      position:absolute; inset:0; display:grid; place-items:center;
      perspective:1200px;
    }

    .glass{
      width:360px; height:760px; border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.02));
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.18) inset,
        0 40px 120px rgba(0,0,0,.65),
        0 0 60px var(--neon-soft);
      position:relative; overflow:hidden;
      transform: rotateX(6deg) rotateY(-8deg);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform: rotateX(6deg) rotateY(-8deg) translateY(0)}
      50%{transform: rotateX(4deg) rotateY(-6deg) translateY(-10px)}
    }

    /* subtle scanlines */
    .glass::after{
      content:""; position:absolute; inset:0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.04),
        rgba(255,255,255,.04) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay; pointer-events:none; opacity:.35;
    }

    /* ====== HEADER ====== */
    header{
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 18px 10px;
      border-bottom:1px solid rgba(255,255,255,.12);
    }

    .logo{
      letter-spacing:.25em; font-weight:700; font-size:12px;
      color:var(--neon);
      text-shadow:0 0 10px var(--neon);
    }

    .status{
      font-size:11px; opacity:.85;
    }

    /* ====== ARC REACTOR CORE ====== */
    .core{
      position:absolute; top:110px; left:50%; transform:translateX(-50%);
      width:180px; height:180px; border-radius:50%;
      filter: drop-shadow(0 0 25px var(--neon));
    }

    .ring{
      position:absolute; inset:0; border-radius:50%;
      border:2px solid rgba(0,246,255,.4);
      animation: spin 12s linear infinite;
    }

    .ring:nth-child(2){ inset:14px; animation-duration: 8s; border-color:rgba(255,179,0,.5)}
    .ring:nth-child(3){ inset:28px; animation-duration: 18s; }

    .pulse{
      position:absolute; inset:50px; border-radius:50%;
      background:radial-gradient(circle at center, #9ffcff, rgba(0,246,255,.15) 60%, transparent 70%);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}

    /* ====== HUD BUTTONS ====== */
    .hud{
      position:absolute; inset:0; padding-top:340px;
      display:grid; grid-template-columns: repeat(3,1fr);
      gap:14px; padding:340px 18px 18px;
    }

    .btn{
      height:96px; border-radius:16px; position:relative;
      background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(10px);
      cursor:pointer; overflow:hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
      transition:.25s ease;
    }

    .btn:hover{
      box-shadow:0 0 22px var(--neon-soft), inset 0 0 0 1px var(--neon);
      transform: translateY(-2px);
    }

    .btn::before{
      content:""; position:absolute; inset:0;
      background: linear-gradient(120deg, transparent 30%, rgba(0,246,255,.35), transparent 70%);
      transform: translateX(-100%);
    }

    .btn:hover::before{ animation: sweep .9s linear; }
    @keyframes sweep{to{transform:translateX(100%)}}

    .icon{
      width:34px; height:34px; border-radius:50%;
      border:2px solid var(--neon);
      margin:16px auto 8px;
      position:relative;
    }

    .icon::after{
      content:""; position:absolute; inset:6px; border-radius:50%;
      background:var(--neon);
      box-shadow:0 0 12px var(--neon);
    }

    .label{
      text-align:center; font-size:11px; letter-spacing:.15em;
      color:#b9fdff;
    }

    /* ====== SIDE WIRES / HUD DECOR ====== */
    .wire{
      position:absolute; top:0; bottom:0; width:1px;
      background: linear-gradient(transparent, var(--neon), transparent);
      opacity:.35; animation: flicker 3s infinite;
    }
    .wire.left{left:8px}
    .wire.right{right:8px}
    @keyframes flicker{0%,100%{opacity:.2}50%{opacity:.6}}

    /* ====== FOOTER ====== */
    footer{
      position:absolute; bottom:10px; left:0; right:0;
      text-align:center; font-size:10px; letter-spacing:.3em;
      opacity:.6;
    }

  </style>
</head>
<body>
  <div class="device">
    <div class="glass">
      <div class="wire left"></div>
      <div class="wire right"></div>

      <header>
        <div class="logo">STARK · OS</div>
        <div class="status">ONLINE · ARC 98%</div>
      </header>

      <div class="core">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="pulse"></div>
      </div>

      <section class="hud">
        <div class="btn"><div class="icon"></div><div class="label">COMMS</div></div>
        <div class="btn"><div class="icon"></div><div class="label">MAP</div></div>
        <div class="btn"><div class="icon"></div><div class="label">AI CORE</div></div>
        <div class="btn"><div class="icon"></div><div class="label">ARMORY</div></div>
        <div class="btn"><div class="icon"></div><div class="label">ENERGY</div></div>
        <div class="btn"><div class="icon"></div><div class="label">SETTINGS</div></div>
      </section>

      <footer>STARK INDUSTRIES · AUTHORIZED USER</footer>
    </div>
  </div>
</body>
</html>
